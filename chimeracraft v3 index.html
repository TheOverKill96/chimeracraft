<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>ChimeraCraft</title>
  <script src="https://cdn.jsdelivr.net/npm/@remix-gg/sdk@latest/dist/index.min.js"></script>
  <style>
    :root {
      --bg1: #130f26;
      --bg2: #231848;
      --panel: rgba(20, 18, 40, 0.82);
      --panel2: rgba(39, 33, 74, 0.92);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f7ff;
      --muted: #b7bdd8;
      --gold: #f6d365;
      --good: #5ee7a5;
      --danger: #ff6b8b;
      --forest: #57b86c;
      --ocean: #45b7ff;
      --desert: #f2b35e;
      --commonA: #7cc8ff;
      --commonB: #ff9f7c;
      --rareA: #b884ff;
      --rareB: #7dffb2;
      --rainbow: #ffe66d;
      --elite: #ff8cf6;
      --solid: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.08));
      --stripes: repeating-linear-gradient(135deg, rgba(255,255,255,0.25) 0 6px, rgba(255,255,255,0.05) 6px 12px);
      --spots: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 0 8%, transparent 9%), radial-gradient(circle at 75% 35%, rgba(255,255,255,0.25) 0 7%, transparent 8%), radial-gradient(circle at 40% 75%, rgba(255,255,255,0.25) 0 9%, transparent 10%), radial-gradient(circle at 60% 60%, rgba(255,255,255,0.2) 0 6%, transparent 7%);
      --neon: linear-gradient(135deg, rgba(0,255,255,0.4), rgba(255,0,255,0.2), rgba(0,255,255,0.4));
      --rainbow-spectrum: linear-gradient(90deg, #ff1744 0%, #ff9100 18%, #ffee58 34%, #00e676 50%, #00b0ff 68%, #7c4dff 84%, #ff2bd6 100%);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; background: radial-gradient(circle at top, #2d2460, #100b21 60%); color: var(--text); font-family: Inter, system-ui, sans-serif; overflow-x: hidden; overflow-y: auto; }
    body { display: flex; justify-content: center; align-items: stretch; }
    #app {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      padding: var(--safe-top, 12px) calc(12px + var(--safe-right, 0px)) calc(12px + var(--safe-bottom, 0px)) calc(12px + var(--safe-left, 0px));
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .topbar, .panel, .card, .slot, .battle-unit, .rod-item, .log-item, .market-item { border: 1px solid var(--line); }
    .topbar, .panel { background: var(--panel); backdrop-filter: blur(10px); border-radius: 18px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; gap: 10px; }
    .brand { display: flex; flex-direction: column; }
    .brand h1 { margin: 0; font-size: 20px; }
    .brand small { color: var(--muted); }
    .currencies { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .pill { padding: 7px 10px; border-radius: 999px; background: rgba(255,255,255,0.08); font-size: 12px; font-weight: 700; }
    .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .tab, button { border: 0; color: var(--text); background: linear-gradient(180deg, #5b54d6, #40389e); border-radius: 14px; padding: 12px 10px; font-weight: 800; font-size: 13px; cursor: pointer; touch-action: manipulation; }
    .tab:active, button:active { transform: scale(0.98); }
    button, .tab, .slot, .battle-unit, .market-item, .rod-item, .rift-btn {
      user-select: none;
      -webkit-user-select: none;
      pointer-events: auto;
    }
    button.secondary, .tab.secondary { background: rgba(255,255,255,0.08); }
    button.ghost { background: transparent; border: 1px solid var(--line); }
    button.sell { background: linear-gradient(180deg, #ff8b7b, #d95b4a); }
    button.keep { background: linear-gradient(180deg, #57d990, #2ea965); }
    button.market { background: linear-gradient(180deg, #66b8ff, #347fdf); }
    button:disabled { opacity: 0.45; }
    .panel { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .screen-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .screen-title h2, .screen-title h3, .screen-title p { margin: 0; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .rift-btn { min-height: 118px; text-align: left; display: flex; flex-direction: column; justify-content: space-between; padding: 12px; }
    .rift-btn small { display: block; white-space: normal; word-wrap: break-word; overflow-wrap: anywhere; line-height: 1.35; font-size: 12px; }
    .rift-forest { background: linear-gradient(180deg, #64ce7c, #2f8c4d); }
    .rift-ocean { background: linear-gradient(180deg, #66cfff, #2778d7); }
    .rift-desert { background: linear-gradient(180deg, #ffc36e, #c98132); }
    .rift-mythical { background: linear-gradient(180deg, #dba6ff, #7d43d4); }
    .catch-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rift-preview { min-height: 100px; border-radius: 18px; padding: 12px; position: relative; overflow: hidden; border: 2px solid rgba(255,255,255,0.18); transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
    .rift-preview .tiny { white-space: normal; word-wrap: break-word; line-height: 1.3; }
    .rift-preview.active { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(246,211,101,0.35), 0 0 18px rgba(246,211,101,0.45); transform: translateY(-1px); }
    .rift-preview h3 { margin: 0 0 4px; }
    .rift-preview small { color: rgba(255,255,255,0.9); }
    .catch-button { font-size: 20px; padding: 16px; }
    .inventory-list, .team-list, .shop-list, .log-list, .market-list { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border-radius: 22px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card-header { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .card-name { font-size: 18px; font-weight: 900; }
    .tiny { font-size: 11px; color: var(--muted); }
    .rarity-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { padding: 5px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; color: #10131c; }
    .tag.dark { color: #fff; background: rgba(255,255,255,0.12); }
    .finder-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 11px;
      font-weight: 800;
      color: #fff;
    }
    .finder-badge span { color: var(--gold); }
    .creature-figure {
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,0.12);
      min-height: 220px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(255,255,255,0.08), rgba(0,0,0,0.16));
    }
    .creature-stack {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .part-label {
      font-size: 10px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }
    .part-piece {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 336px;
      min-height: 84px;
      padding: 6px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      width: 100%;
    }
    .part-icon {
      font-size: 44px;
      line-height: 1;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.35));
      text-shadow: 0 2px 0 rgba(0,0,0,0.25);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .part-piece .part-icon {
      font-size: 56px;
    }
    .part-piece .part-label {
      font-size: 10px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      font-weight: 800;
    }
    .part-arms-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      width: 100%;
    }
    .part-body .part-icon { font-size: 56px; transform: scaleY(1.3); }
    .part-legs .part-icon { font-size: 56px; transform: scaleY(1.3); }
    .part-head .part-icon { font-size: 56px; transform: scaleY(1.3); }
    .part-arms .part-icon { font-size: 56px; transform: scaleY(1.3); }
    .part-piece .part-icon {
      font-size: 56px;
      transform: translateX(-50%) scaleY(1.3);
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.35));
    }
    .part-piece .part-label {
      font-size: 10px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      font-weight: 800;
      min-width: 50px;
      position: relative;
      z-index: 1;
    }
    .part-label-icon {
      font-size: 24px;
      margin-right: 4px;
    }
    @keyframes rainbowPulse {
      0%, 100% { filter: brightness(1) saturate(1); }
      50% { filter: brightness(1.3) saturate(1.5); }
    }
    @keyframes rainbowShift {
      0% { background-position: 0% 50%; filter: brightness(1.08) saturate(1.2); }
      50% { background-position: 100% 50%; filter: brightness(1.2) saturate(1.35); }
      100% { background-position: 0% 50%; filter: brightness(1.08) saturate(1.2); }
    }
    @keyframes neonTrace {
      0%, 100% { filter: brightness(1) saturate(1.2); opacity: 0.92; }
      50% { filter: brightness(1.3) saturate(1.55); opacity: 1; }
    }
    .quad-icon {
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.35));
      font-size: 56px;
      line-height: 1;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 8px; border: 1px solid rgba(255,255,255,0.1); }
    .stat-line { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 700; }
    .stat-label-group { display: flex; align-items: center; gap: 6px; }
    .stat-rank {
      min-width: 22px;
      text-align: center;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.4px;
      color: #10131c;
      background: rgba(255,255,255,0.75);
    }
    .rank-ss { background: linear-gradient(180deg, #fff, var(--rainbow)); color: #3b2500; box-shadow: 0 0 8px rgba(255,230,109,0.6); }
    .rank-s { background: linear-gradient(180deg, var(--rainbow), #ffb347); color: #3b2500; }
    .rank-a { background: linear-gradient(180deg, #7dffb2, #41d98b); color: #06361d; }
    .rank-b { background: linear-gradient(180deg, #8fd3ff, #5caeff); color: #08233b; }
    .rank-c { background: linear-gradient(180deg, #d5c4ff, #b38cff); color: #281340; }
    .rank-d { background: linear-gradient(180deg, #ffb38f, #ff8b66); color: #40180a; }
    .rank-f { background: linear-gradient(180deg, #ff8fa3, #ff627d); color: #460a18; }
    .rank-ff { background: linear-gradient(180deg, #333, #111); color: #888; }
    .bar { height: 12px; background: rgba(0,0,0,0.4); border-radius: 999px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.4); }
    .fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #4a90d9, #5cb85c); transition: width 0.3s ease; }
    .fill.high { background: linear-gradient(90deg, #f0ad4e, #d9534f); box-shadow: 0 0 8px rgba(240,173,78,0.5); }
    .fill.very-high { background: linear-gradient(90deg, #ffe66d, #ff9cf3); box-shadow: 0 0 12px rgba(255,230,109,0.6); }
    .tier-badge { padding: 6px 10px; border-radius: 999px; font-size: 11px; font-weight: 900; letter-spacing: 0.3px; }
    .tier-low { background: rgba(255,255,255,0.1); color: #e5e8f5; }
    .tier-good { background: rgba(125,255,178,0.2); color: #9dffbf; }
    .tier-strong { background: rgba(184,132,255,0.22); color: #d7b2ff; }
    .tier-elite { background: rgba(255,140,246,0.24); color: #ffb0f7; box-shadow: 0 0 12px rgba(255,140,246,0.22); }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .slot, .battle-unit, .rod-item, .log-item, .market-item {
      background: var(--panel2);
      border-radius: 16px;
      padding: 10px;
    }
    .slot.selected, .battle-unit.targeted { outline: 2px solid var(--gold); }
    .battle-unit.active-target {
      outline: 2px solid var(--gold);
      box-shadow: 0 0 0 2px rgba(246,211,101,0.2), 0 0 18px rgba(246,211,101,0.35);
    }
    .hp-text-low { color: #ff8fa3; font-weight: 900; }
    .hp-text-mid { color: #ffe08a; font-weight: 800; }
    .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
    .bench { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .battle-lanes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .battle-column { display: flex; flex-direction: column; gap: 8px; }
    .battle-unit small, .slot small, .rod-item small, .market-item small { color: var(--muted); }
    .focus-note { color: var(--gold); font-size: 12px; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .menu-card { min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; }
    .empty { color: var(--muted); text-align: center; padding: 18px 12px; }
    .toast { position: fixed; left: 50%; bottom: calc(20px + var(--safe-bottom, 0px)); transform: translateX(-50%); background: rgba(10,10,20,0.92); border: 1px solid var(--line); padding: 10px 14px; border-radius: 999px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100; }
    .toast.show { opacity: 1; }
    .reveal-stage {
      position: relative;
      min-height: 70vh;
      overflow-y: auto;
      overflow-x: hidden;
      background: radial-gradient(circle at top, rgba(120,90,255,0.16), rgba(0,0,0,0.18));
      -webkit-overflow-scrolling: touch;
    }
    .reveal-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(5, 5, 16, 0.42);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .reveal-overlay.active { opacity: 1; }
    .reveal-center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: flex-start;
      min-height: auto;
      text-align: center;
      padding: 8px 4px 24px;
    }
    .reveal-status {
      font-size: 13px;
      color: var(--gold);
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .reveal-subtle {
      color: var(--muted);
      font-size: 12px;
    }
    .rift-build {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .rift-orb {
      min-height: 120px;
      border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 24px rgba(255,255,255,0.08);
      animation: riftPulse 0.9s ease-in-out infinite;
    }
    .rift-orb strong { font-size: 18px; }
    .rift-orb small { color: rgba(255,255,255,0.88); }
    .reveal-pair {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }
    .reveal-parent {
      min-height: 210px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
    }
    .reveal-parent.hidden-parent {
      background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(255,255,255,0.02));
      animation: silhouetteFloat 0.9s ease-in-out infinite;
    }
    .reveal-parent.revealed {
      animation: revealPop 0.32s ease-out;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 16px 30px rgba(0,0,0,0.28);
    }
    .reveal-parent.fusion-left { animation: slideToCenterLeft 0.42s ease-in forwards; }
    .reveal-parent.fusion-right { animation: slideToCenterRight 0.42s ease-in forwards; }
    .reveal-stage.finalized .reveal-pair,
    .reveal-stage.finalized .fusion-flash,
    .reveal-stage.finalized .reveal-overlay {
      display: none;
    }
    .reveal-stage.finalized .reveal-center {
      min-height: auto;
      justify-content: flex-start;
      padding-bottom: 12px;
    }
    .parent-icon {
      font-size: 54px;
      line-height: 1;
      filter: drop-shadow(0 6px 6px rgba(0,0,0,0.3));
    }
    .parent-silhouette {
      font-size: 56px;
      line-height: 1;
      color: rgba(255,255,255,0.15);
      text-shadow: 0 0 12px rgba(255,255,255,0.12);
    }
    .parent-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }
    .mini-tag {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .fusion-flash {
      position: absolute;
      inset: 12% 10%;
      border-radius: 24px;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.86);
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0.35) 35%, transparent 70%);
    }
    .fusion-flash.active { animation: fusionBurst 0.45s ease-out forwards; }
    .final-reveal-wrap {
      width: 100%;
      animation: finalRevealIn 0.42s ease-out;
    }
    .reveal-stage.finalized .final-reveal-wrap {
      animation: none;
    }
    .rarity-banner {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .rarity-banner.rare { background: rgba(184,132,255,0.2); color: #dec2ff; }
    .rarity-banner.neon { background: rgba(0,255,255,0.16); color: #aefcff; box-shadow: 0 0 14px rgba(0,255,255,0.24); animation: neonPulse 0.9s ease-in-out infinite; }
    .rarity-banner.shiny { background: rgba(255,215,0,0.18); color: #ffe98f; box-shadow: 0 0 16px rgba(255,215,0,0.28); }
    .rarity-banner.ultra { background: rgba(255,215,0,0.24); color: #fff2a8; box-shadow: 0 0 22px rgba(255,215,0,0.42); animation: ultraPulse 0.8s ease-in-out infinite; }
    .screen-shake { animation: screenShake 0.28s linear 1; }
    .sparkles::before,
    .sparkles::after {
      content: '✦';
      position: absolute;
      font-size: 22px;
      color: rgba(255,230,109,0.92);
      text-shadow: 0 0 10px rgba(255,230,109,0.72);
      animation: sparkleFloat 1s ease-in-out infinite;
    }
    .sparkles::before { top: 16px; left: 18px; }
    .sparkles::after { right: 18px; bottom: 16px; animation-delay: 0.2s; }
    @keyframes riftPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 18px rgba(255,255,255,0.08); }
      50% { transform: scale(1.03); box-shadow: 0 0 0 1px rgba(246,211,101,0.22), 0 0 24px rgba(246,211,101,0.24); }
    }
    @keyframes silhouetteFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes revealPop {
      0% { transform: scale(0.88); }
      65% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    @keyframes slideToCenterLeft {
      to { transform: translateX(28%) scale(0.96); opacity: 0.82; }
    }
    @keyframes slideToCenterRight {
      to { transform: translateX(-28%) scale(0.96); opacity: 0.82; }
    }
    @keyframes fusionBurst {

    ];
    
    function rollColor() {
      const roll = Math.random() * 100;
      if (roll < 36) return { name: 'Brown', rarity: 'Common', hex: '#7a5232' };
      if (roll < 64) return { name: 'Gray', rarity: 'Common', hex: '#686868' };
      if (roll < 72) return { name: 'Red', rarity: 'Rare', hex: '#ff2d3f' };
      if (roll < 80) return { name: 'Blue', rarity: 'Rare', hex: '#2f7dff' };

      return { name: 'Rainbow', rarity: 'Rainbow', hex: '#ff4fd8' };
    }
    function rollAura() {
      // 10% chance to get an aura, 90% chance for None
      const hasAura = Math.random() < 0.10;
      if (!hasAura) return { name: 'None', rarity: 'None', color: null };
      
      // Equal chance for each of the 4 auras (25% each)
      const roll = Math.random() * 4;
      if (roll < 1) return { name: 'Fire', rarity: 'Aura', color: '#ff7a2d' };
      if (roll < 2) return { name: 'Frost', rarity: 'Aura', color: '#7ddfff' };
      if (roll < 3) return { name: 'Electric', rarity: 'Aura', color: '#ffe14a' };
      return { name: 'Void', rarity: 'Aura', color: '#9b59ff' };
    }
    
    function combineAuras(auraA, auraB) {
      // Priority: Void > Electric > Frost > Fire > None
      const priority = { 'Void': 4, 'Electric': 3, 'Frost': 2, 'Fire': 1, 'None': 0 };
      if (priority[auraA.name] >= priority[auraB.name]) return auraA;
      return auraB;
    }
    
    function combineAuras(auraA, auraB) {
      // Priority: Void > Electric > Frost > Fire > None
      const priority = { 'Void': 4, 'Electric': 3, 'Frost': 2, 'Fire': 1, 'None': 0 };
      if (priority[auraA.name] >= priority[auraB.name]) return auraA;
      return auraB;
    }
    const bodyPartSlots = ['head', 'arms', 'body', 'legs'];
    const rods = [
      { id: 'color', name: 'Prism Rod', cost: 150, uses: 5, effect: 'Better rare color odds' },

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function weighted(pool, boost = {}) {
      const total = pool.reduce((sum, item) => sum + (boost[item.name] ?? boost[item.rarity] ?? 0) + item.weight, 0);
      let roll = Math.random() * total;
      for (const item of pool) {
        roll -= item.weight + (boost[item.name] ?? boost[item.rarity] ?? 0);
        if (roll <= 0) return item;
      }
      return pool[0];
    }
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => toastEl.classList.remove('show'), 1600);

    function haptic() {
      if (window.RemixSDK && window.RemixSDK.hapticFeedback) {
        window.RemixSDK.hapticFeedback();
      }
    }
    function uid() {
      return 'RC-' + Math.random().toString(36).slice(2, 6).toUpperCase() + '-' + Date.now().toString(36).slice(-4).toUpperCase();
    }
    function titleCase(str) { return str.charAt(0).toUpperCase() + str.slice(1); }
    function fusionName(a, b) {
      return a + ' + ' + b;
    }
    function bodyPartAssignments() {
      const fromA = Math.random() < 0.5 ? 2 : 3;
      const shuffled = [...bodyPartSlots].sort(() => Math.random() - 0.5);
      const aParts = shuffled.slice(0, fromA);
      const assignment = {};
      bodyPartSlots.forEach(slot => {
        assignment[slot] = aParts.includes(slot) ? 'A' : 'B';
      });
      return { assignment, fromA };
    }
    function tintStyle(colorHex) {

      return `color:${colorHex}; text-shadow: 0 2px 8px rgba(0,0,0,0.35);`;
    }

    function statRoll(min, max) {

    function fusionVariance() {
      return 1 + (Math.random() * 0.14 - 0.07);
    }
    function currentRodBoost() {
      const rod = state.activeRod;
      if (!rod) return {};
      return {

    function generateCreature() {
      const [riftA, riftB] = state.selectedRifts;
      const sameRift = riftA === riftB;
      const animalsA = Object.keys(rifts[riftA].animals);
      const animalsB = Object.keys(rifts[riftB].animals);
      const rodBoost = currentRodBoost();
      let animalA = choice(animalsA);
      const colorA = weighted(colorPool, rodBoost.color || {});
      const auraA = rollAura();
      const { assignment: partSource, fromA } = bodyPartAssignments();
      let animalB;
      if (sameRift) {
        const forceDuplicate = Math.random() < 0.05;
        if (forceDuplicate) {
          animalB = animalA;
        } else {
          const differentAnimals = animalsB.filter(name => name !== animalA);

        }

      const ratio = fromA === 2 ? '50/50' : (bodyPartSlots.filter(slot => partSource[slot] === 'A').length === 3 ? '75/25 A' : '75/25 B');
      const aData = animalData(riftA, animalA);
      const bData = animalData(riftB, animalB);
      
      // Generate stats per body part
      const stats = {
        hp: 0,
        atk: 0,
        def: 0,
        spd: 0
      };
      
      // For each body part, roll the appropriate stat from the source animal
      bodyPartSlots.forEach(slot => {
        const sourceAnimal = partSource[slot] === 'A' ? aData : bData;
        let statValue;
        
        switch(slot) {
          case 'head':
            statValue = statRoll(sourceAnimal.stats.def[0], sourceAnimal.stats.def[1]);
            stats.def = statValue;
            break;
          case 'arms':
            statValue = statRoll(sourceAnimal.stats.atk[0], sourceAnimal.stats.atk[1]);
            stats.atk = statValue;
            break;
          case 'body':
            statValue = statRoll(sourceAnimal.stats.hp[0], sourceAnimal.stats.hp[1]);
            stats.hp = statValue;
            break;
          case 'legs':
            statValue = statRoll(sourceAnimal.stats.spd[0], sourceAnimal.stats.spd[1]);
            stats.spd = statValue;
            break;
        }
      });
      
      // Stat ranges should match the actual source body part used for each stat
      const statRanges = {
        hp: partSource.body === 'A' ? [...aData.stats.hp] : [...bData.stats.hp],
        atk: partSource.arms === 'A' ? [...aData.stats.atk] : [...bData.stats.atk],
        def: partSource.head === 'A' ? [...aData.stats.def] : [...bData.stats.def],
        spd: partSource.legs === 'A' ? [...aData.stats.spd] : [...bData.stats.spd]
      };
      
      const aPartCount = bodyPartSlots.filter(slot => partSource[slot] === 'A').length;
      const bPartCount = 4 - aPartCount;
      const dominantAnimal = aPartCount > bPartCount ? 'A' : 'B';
      const hasRainbow = colorA.name === 'Rainbow' || colorB.name === 'Rainbow';
      const bothRareColors = colorA.rarity === 'Rare' && colorB.rarity === 'Rare';
      const rarityTags = [];
      let rarityLabel = 'Common';

      if (colorA.name === 'Rainbow' && colorB.name === 'Rainbow') {
        rarityLabel = 'Double Rainbow';
        rarityTags.push('Double Rainbow');
      } else if (hasRainbow) {
        rarityLabel = 'Rainbow';
        rarityTags.push('Rainbow');
      } else if (bothRareColors) {
        rarityLabel = 'Rare Color Combo';
        rarityTags.push('Rare Color Combo');
      } else if (colorA.rarity === 'Rare' || colorB.rarity === 'Rare') {
        rarityLabel = 'Rare';
        rarityTags.push('Rare');
      }

      let flow = 0;
      const head = partSource.head === 'A'
        ? { animal: animalA, icon: aData.parts.head, color: colorA, source: 'A' }
        : { animal: animalB, icon: bData.parts.head, color: colorB, source: 'B' };
      const arms = partSource.arms === 'A'
        ? { animal: animalA, icon: aData.parts.arms, color: colorA, source: 'A' }
        : { animal: animalB, icon: bData.parts.arms, color: colorB, source: 'B' };
      const body = partSource.body === 'A'
        ? { animal: animalA, icon: '🫁', color: colorA, source: 'A' }
        : { animal: animalB, icon: '🫁', color: colorB, source: 'B' };
      const legs = partSource.legs === 'A'
        ? { animal: animalA, icon: aData.parts.legs, color: colorA, source: 'A' }
        : { animal: animalB, icon: bData.parts.legs, color: colorB, source: 'B' };

      if (head.animal === arms.animal) flow += 10;
      if (arms.animal === body.animal) flow += 15;
      if (body.animal === legs.animal) flow += 10;

      let colorScore = 0;
      if (colorA.name === 'Rainbow' && colorB.name === 'Rainbow') {
        colorScore = 25;
      } else if (colorA.name === 'Rainbow' || colorB.name === 'Rainbow') {
        colorScore = 18;
      } else if (colorA.name === colorB.name) {
        colorScore = colorA.rarity === 'Common' ? 18 : 22;
      } else if (colorA.rarity === colorB.rarity) {
        colorScore = 14;
      } else {
        colorScore = 8;
      }

      let theme = 0;
      if (animalA === animalB) {
        theme = 20;
      } else if (dominantAnimal === 'A' || dominantAnimal === 'B') {
        theme = 12;
      } else {
        theme = 6;
      }

      let rarity = 0;
      if (rarityLabel === 'Double Rainbow') rarity = 20;
      else if (rarityLabel === 'Rainbow') rarity = 16;
      else if (rarityLabel === 'Rare Color Combo') rarity = 10;
      else if (rarityLabel === 'Rare') rarity = 6;
      else rarity = 2;

      const looksRating = Math.min(100, Math.round(
        flow +
        colorScore +
        theme +
        rarity
      ));
      
      // Calculate sell value based on rarity only (no rating tier)
      let baseValue = 5; // Base value
      
      // Rarity bonus
      let rarityBonus = 0;
      if (rarityLabel === 'Double Rainbow') rarityBonus = 40;

      if (!playerActive.length && !enemyActive.length) return finishBattle();
      if (!playerActive.length || !enemyActive.length) return finishBattle();
      
      // Turn order: fastest first
      const turnOrder = [
        ...playerActive.map(c => ({ unit: c, side: 'player' })),
        ...enemyActive.map(c => ({ unit: c, side: 'enemy' }))
      ].sort((a, b) => b.unit.stats.spd - a.unit.stats.spd);
      
      let acted = false;

      const executeAttack = (entry, isBonus = false) => {
        if (battle.over || battle.pendingReplace) return false;

        const foes = entry.side === 'player' ? battle.enemy : battle.player;

    function revealScreen() {
      let rarityMessage = '';
      let featureMessage = '';
      let statMessage = '';
      
      if (state.latestCatch) {
        const c = state.latestCatch;
        
        if (c.rarityLabel === 'Double Rainbow') {
          rarityMessage = '🌟 DOUBLE RAINBOW! Both parent animals rolled rainbow colors!';
        } else if (c.rarityLabel === 'Rainbow') {
          rarityMessage = '✨ RAINBOW! One parent rolled the jackpot color!';
        } else if (c.rarityLabel === 'Rare Color Combo') {
          rarityMessage = '💎 RARE COLOR COMBO! Both parent colors are rare.';
        } else if (c.rarityLabel === 'Rare') {
          rarityMessage = '💎 RARE! Good find! Consider keeping for battle or market.';
        } else {
          rarityMessage = 'Common catch. Check stats and value before deciding.';
        }
        
        const features = [];
        if (c.colorA.name === c.colorB.name) features.push('matching colors');
        if (c.parts[0] === c.parts[1]) features.push('duplicate animal');
        if (bodyPartSlots.filter(slot => c.partSource[slot] === c.dominantAnimal).length === 3) features.push('dominant 3-part build');
        
        if (features.length === 3) {
          featureMessage = '🔥 Perfectly stacked fusion! Matching colors, duplicate animal, and a dominant 3-part build!';
        } else if (features.length === 2) {
          featureMessage = `✨ Great fusion! ${features[0]} and ${features[1]}!`;
        } else if (features.length === 1) {
          featureMessage = `Nice! ${features[0]}!`;
        }
        
        const perfectStats = [];
        const badStats = [];
        const avgStats = [];
        
        ['hp', 'atk', 'def', 'spd'].forEach(stat => {
          const val = c.stats[stat];
          const [min, max] = c.statRanges[stat];
          const range = max - min;
          const percent = range <= 0 ? 0.5 : (val - min) / range;
          
          if (percent >= 0.9) perfectStats.push(stat.toUpperCase());
          else if (percent <= 0.2) badStats.push(stat.toUpperCase());
          else if (percent >= 0.4 && percent <= 0.6) avgStats.push(stat.toUpperCase());
        });
        
        if (perfectStats.length >= 2) {
          statMessage = `🎯 Excellent! ${perfectStats.join(', ')} are near perfect!`;
        } else if (perfectStats.length === 1) {
          statMessage = `👍 Good roll! ${perfectStats[0]} is strong!`;
        } else if (badStats.length >= 2) {
          statMessage = `⚠️ Tough roll! ${badStats.join(', ')} are weak...`;
        } else if (badStats.length === 1) {
          statMessage = `Hmm, ${badStats[0]} could be better.`;
        } else if (avgStats.length >= 3) {
          statMessage = `📊 Balanced stats across the board.`;
        }
        
        if (c.rarityLabel === 'Common' && perfectStats.length >= 2) {
          featureMessage = `🌟 Hidden gem! Basic look but ${perfectStats.length} perfect stats!`;
        }
      }

      const c = state.latestCatch;
      const seq = state.revealSequence;
      if (!c) {
        return `
          <div class="panel" style="max-height: 75vh; overflow-y: auto; padding-bottom: 20px;">
            <div class="screen-title"><h2>Catch Reveal</h2><button class="ghost" onclick="go('rifts')">Back</button></div>
            <div class="empty">Catch something first.</div>
          </div>
        `;
      }

      const rarityClassName = c.rarityLabel === 'Double Rainbow' ? 'ultra' : c.rarityLabel === 'Rainbow' ? 'shiny' : c.rarityLabel === 'Rare' || c.rarityLabel === 'Rare Color Combo' ? 'rare' : '';
      const parentCard = (label, icon, animal, color, pattern, shown, fusionClass = '') => `
        <div class="reveal-parent ${shown ? 'revealed' : 'hidden-parent'} ${fusionClass}">
          ${shown ? `
            <div class="parent-icon">${icon}</div>
            <strong>${animal}</strong>
            <div class="parent-meta">
              <span class="mini-tag" style="background:${color.hex}; color:${color.name === 'Rainbow' ? '#fff' : '#10131c'};">${color.name}</span>
            </div>
            <small class="reveal-subtle">${label}</small>
          ` : `
            <div class="parent-silhouette">???</div>
            <strong>Unknown</strong>
            <small class="reveal-subtle">Hidden signature</small>
          `}
        </div>`;

      const stagedReveal = seq ? `
        <div class="panel reveal-stage ${seq.final ? 'finalized' : ''} ${seq.shake ? 'screen-shake' : ''}" style="overflow-y: auto; padding-bottom: 20px; -webkit-overflow-scrolling: touch;">
          <div class="reveal-overlay ${seq.step === 'build' || seq.step === 'fusion' ? 'active' : ''}"></div>
          <div class="screen-title"><h2>Catch Reveal</h2><button class="ghost" onclick="go('rifts')">Skip</button></div>
          <div class="reveal-center">
            <div class="reveal-status">${seq.message}</div>
            <div class="reveal-subtle">${seq.subMessage}</div>
            ${seq.step === 'build' ? `
              <div class="rift-build">
                ${c.rifts.map(name => `<div class="rift-orb ${rifts[name].cls}"><strong>${rifts[name].icon} ${name}</strong><small>Rift stabilizing</small></div>`).join('')}
              </div>
            ` : ''}
            ${seq.step === 'silhouettes' || seq.step === 'parentA' || seq.step === 'parentB' || seq.step === 'fusion' ? `
              <div class="reveal-pair">
                ${parentCard('Parent A', c.icons[0], c.parts[0], c.colorA, seq.showA, seq.fusioning ? 'fusion-left' : '')}
                ${parentCard('Parent B', c.icons[1], c.parts[1], c.colorB, seq.showB, seq.fusioning ? 'fusion-right' : '')}
              </div>
              <div class="fusion-flash ${seq.fusioning ? 'active' : ''}"></div>
            ` : ''}
            ${seq.final ? `
              <div class="final-reveal-wrap ${c.rarityLabel === 'Rainbow' || c.rarityLabel === 'Ultra Rare' ? 'sparkles' : ''}">
                ${rarityClassName ? `<div class="rarity-banner ${rarityClassName}">${c.rarityLabel === 'Ultra Rare' ? 'Ultra Rare!' : c.rarityLabel}</div>` : ''}
                <div class="tiny" style="font-weight: bold; color: ${c.rarityLabel === 'Rainbow' || c.rarityLabel === 'Double Rainbow' ? '#FFD700' : '#fff'}; text-align: center; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 8px;">${rarityMessage}</div>
                ${featureMessage ? `<div class="tiny" style="text-align: center; padding: 6px; background: rgba(100,100,255,0.2); border-radius: 6px; margin-bottom: 8px;">${featureMessage}</div>` : ''}
                ${statMessage ? `<div class="tiny" style="text-align: center; padding: 6px; background: rgba(255,100,100,0.2); border-radius: 6px; margin-bottom: 8px;">${statMessage}</div>` : ''}
                ${renderCard(c, true)}
              </div>
            ` : ''}
          </div>
        </div>
      ` : `
        <div class="panel" style="max-height: 75vh; overflow-y: auto; padding-bottom: 20px;">
          <div class="screen-title"><h2>Catch Reveal</h2><button class="ghost" onclick="go('rifts')">Back</button></div>
          <div class="tiny" style="font-weight: bold; color: ${c.rarityLabel === 'Rainbow' ? '#FFD700' : c.rarityLabel === 'Neon' ? '#00FFFF' : c.rarityLabel === 'Ultra Rare' ? '#FFD700' : '#fff'}; text-align: center; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 8px;">${rarityMessage}</div>
          ${featureMessage ? `<div class="tiny" style="text-align: center; padding: 6px; background: rgba(100,100,255,0.2); border-radius: 6px; margin-bottom: 8px;">${featureMessage}</div>` : ''}
          ${statMessage ? `<div class="tiny" style="text-align: center; padding: 6px; background: rgba(255,100,100,0.2); border-radius: 6px; margin-bottom: 8px;">${statMessage}</div>` : ''}
          ${renderCard(c, true)}
        </div>
      `;

      return stagedReveal;
    }

    function battleScreen() {
      const battle = state.battle;
      if (!battle) return `<div class="panel"><div class="empty">No battle active.</div></div>`;
      const playerActive = nextActive(battle.player);
      const enemyActive = nextActive(battle.enemy);
      const playerBench = benchOf(battle.player);
      const hpTextClass = (card) => {
        const ratio = card.stats.hp ? card.currentHp / card.stats.hp : 0;
        if (ratio <= 0.3) return 'hp-text-low';
        if (ratio <= 0.6) return 'hp-text-mid';
        return '';
      };
      const hpFillStyle = (card) => {
        const ratio = card.stats.hp ? card.currentHp / card.stats.hp : 0;
        if (ratio <= 0.3) return '#ff6b8b';
        if (ratio <= 0.6) return '#f6d365';
        return '#5ee7a5';
      };
      // Create slots for active positions (show vacant spots)
      const playerSlots = [battle.player[0], battle.player[1]];
      const enemySlots = [battle.enemy[0], battle.enemy[1]];
      return `
        <div class="panel">
          <div class="screen-title"><h2>2v2 Auto Battle</h2><button class="ghost" onclick="go('menu')">Menu</button></div>
          <div class="focus-note">Tap an enemy to focus allied attacks. ${state.focusTarget ? 'Focused target locked.' : 'Default target is lowest-health enemy.'}</div>
          <div class="battle-lanes">
            <div class="battle-column">
              <strong>Your Active</strong>
              ${playerSlots.map((card, i) => {
                if (!card || card.currentHp <= 0) {
                  return `<div class="battle-unit" style="opacity: 0.5;"><div class="row"><strong>Empty Slot ${i + 1}</strong><small>Tap bench to fill</small></div></div>`;
                }
                return `<div class="battle-unit"><div class="row"><strong>${card.name}</strong><small class="${hpTextClass(card)}">${card.currentHp}/${card.stats.hp} HP</small></div><div class="bar"><div class="fill" style="width:${(card.currentHp / card.stats.hp) * 100}%; background:${hpFillStyle(card)};"></div></div></div>`;
              }).join('')}
              <strong>Bench</strong>
              ${playerBench.map(card => `<div class="battle-unit" ${battle.pendingReplace ? `onclick="chooseReplacement('${card.id}')"` : ''}><div class="row"><strong>${card.name}</strong><small class="${hpTextClass(card)}">${card.currentHp}/${card.stats.hp} HP</small></div><div class="bar"><div class="fill" style="width:${(card.currentHp / card.stats.hp) * 100}%; background:${hpFillStyle(card)};"></div></div></div>`).join('') || '<div class="battle-unit"><small>No bench</small></div>'}
            </div>
            <div class="battle-column">
              <strong>Enemy Active</strong>
              ${enemySlots.map((card, i) => {
                if (!card || card.currentHp <= 0) {
                  return `<div class="battle-unit" style="opacity: 0.5;"><div class="row"><strong>Empty Slot ${i + 1}</strong><small>Enemy will replace</small></div></div>`;
                }
                return `<div class="battle-unit ${state.focusTarget === card.id ? 'active-target targeted' : ''}" onclick="setFocus('${card.id}')"><div class="row"><strong>${card.name}</strong><small class="${hpTextClass(card)}">${card.currentHp}/${card.stats.hp} HP</small></div><div class="bar"><div class="fill" style="width:${(card.currentHp / card.stats.hp) * 100}%; background:${hpFillStyle(card)};"></div></div></div>`;
              }).join('')}
              <strong>Enemy Bench</strong>
              ${benchOf(battle.enemy).map(card => `<div class="battle-unit"><div class="row"><strong>${card.name}</strong><small class="${hpTextClass(card)}">${card.currentHp}/${card.stats.hp} HP</small></div><div class="bar"><div class="fill" style="width:${(card.currentHp / card.stats.hp) * 100}%; background:${hpFillStyle(card)};"></div></div></div>`).join('')}
            </div>
          </div>
          ${battle.pendingReplace ? '<div class="panel"><strong>Choose a replacement now.</strong><small>Tap a bench creature to fill the vacant slot.</small></div>' : ''}
          <div class="panel"><strong>Battle Log</strong>${battle.log.slice(0, 7).map(line => `<div class="tiny ${line.includes('fainted') ? 'battle-ko' : line.includes('attacked') ? 'battle-hit' : ''}">• ${line}</div>`).join('')}</div>
          ${battle.over ? `
            <div class="panel" style="text-align: center;">
              <h2 style="color: ${battle.winner === 'player' ? '#5ee7a5' : '#ff6b8b'}; margin: 0 0 10px;">
                ${battle.winner === 'player' ? '🏆 VICTORY!' : '💀 DEFEAT'}
              </h2>
              <button onclick="go('menu')">${battle.winner === 'player' ? 'Continue' : 'Return to Menu'}</button>
            </div>
          ` : ''}
        </div>
      `;
    }
    function shopScreen() {
      return `
        <div class="panel">
          <div class="screen-title"><h2>Rod Shop</h2><button class="ghost" onclick="go('menu')">Menu</button></div>
          <div class="tiny">Rods are expensive but improve your catch odds significantly.</div>
          <div class="shop-list">
            ${rods.map(rod => `<div class="rod-item"><div class="row"><strong>${rod.name}</strong><strong style="color: ${state.coins >= rod.cost ? '#fff' : '#ff6b8b'}">${rod.cost}c</strong></div><small>${rod.effect} · ${rod.uses} uses</small><button onclick="buyRod('${rod.id}'); render();" ${state.coins < rod.cost ? 'disabled' : ''}>Buy</button></div>`).join('')}
          </div>
          <div class="panel"><strong>Owned Rods</strong>${state.ownedRods.length ? state.ownedRods.map((rod, i) => `<div class="rod-item"><div class="row"><strong>${rod.name}</strong><small>${rod.usesLeft} uses left</small></div><button class="secondary" onclick="equipRod(${i});">${state.activeRod === rod ? 'Unequip' : 'Equip'}</button></div>`).join('') : '<div class="empty">No rods yet.</div>'}</div>
        </div>
      `;
    }
    function marketScreen() {
      return `
        <div class="panel">
          <div class="screen-title"><h2>Market</h2><button class="ghost" onclick="go('menu')">Menu</button></div>
          <div class="tiny">Market payouts are higher than quick selling, but paid in market coins.</div>
          <div class="market-list">
            ${state.marketListings.length ? state.marketListings.map(item => `
              <div class="market-item market-highlight" style="${item.rarityLabel === 'Rainbow' ? 'border-color: #FFD700;' : item.rarityLabel === 'Neon' ? 'border-color: #00FFFF;' : ''}">
                <div class="row">
                  <strong>${item.name}</strong>
                  <strong style="color: #FFD700;">+${item.marketValue} MC</strong>
                </div>
                <small>${item.rarityLabel} · Rating ${item.rating} · ${item.ratingTier}</small>
                <small style="color: #888;">Quick Sell: ${item.sellValue} coins | Market: ${item.marketValue} MC (+${item.marketValue - item.sellValue})</small>
                <button onclick="claimMarket('${item.id}')">Claim Sale</button>
              </div>`).join('') : '<div class="empty">No listings yet.</div>'}
          </div>
        </div>
      `;
    }
    function logScreen() {
      return `
        <div class="panel">
          <div class="screen-title"><h2>Collection Log</h2><button class="ghost" onclick="go('menu')">Menu</button></div>
          <div class="log-list">
            <div class="log-item"><strong>Discovered Variants</strong><small>${Object.keys(state.collection).length}</small></div>
            <div class="log-item"><strong>Total Cards Revealed</strong><small>${state.revealedCount}</small></div>
            <div class="log-item"><strong>Inventory Cards</strong><small>${state.inventory.length}</small></div>
            <div class="log-item"><strong>Current Team Size</strong><small>${state.team.length}</small></div>
          </div>
          <div class="screen-title" style="margin-top: 12px;"><h3>Color Odds</h3></div>
          <div class="log-list">
            ${colorPool.map(c => `<div class="log-item"><div class="row"><span class="tag" style="background:${c.hex}; color:${c.name === 'Rainbow' ? '#fff' : '#10131c'}">${c.name}</span><small>${c.rarity}</small></div><small>${c.weight}% chance</small></div>`).join('')}
          </div>
          <div class="screen-title" style="margin-top: 12px;"><h3>Game Menu Odds</h3></div>
          <div class="log-list">
            <div class="log-item"><strong>Colors:</strong> Brown 39.5% · Gray 39.5% · Red 10% · Blue 10% · Purple 5% · Rainbow 1%</div>
            <div class="log-item"><strong>Part Slots:</strong> Head · Arms · Body · Legs</div>
            <div class="log-item"><strong>Visual Fusion:</strong> 60% split gives 2 parts from each animal · 40% split gives 3 parts from one animal and 1 from the other</div>
          </div>
        </div>
      `;
    }
    function getRenderSignature() {
      const battleLogLength = state.battle ? state.battle.log.length : 0;
      const revealStep = state.revealSequence ? [state.revealSequence.step, state.revealSequence.showA, state.revealSequence.showB, state.revealSequence.fusioning, state.revealSequence.final].join('|') : 'none';
      return [
        state.screen,
        state.coins,
        state.marketCoins,
        state.inventory.length,
        state.team.join(','),
        state.marketListings.length,
        Object.keys(state.collection).length,
        state.revealedCount,
        state.selectedRifts.join(','),
        state.activeRod ? state.activeRod.id + ':' + state.activeRod.usesLeft : 'none',
        state.latestCatch ? state.latestCatch.id : 'none',
        revealStep,
        battleLogLength,
        state.focusTarget || 'none'
      ].join('::');
    }
    function render(force = false) {
      const activeElement = document.activeElement;
      const scrollHost = app;
      const preserveScroll = !activePointerId;
      appScrollTop = scrollHost ? scrollHost.scrollTop : appScrollTop;
      const showTabs = state.screen !== 'intro';
      const signature = getRenderSignature();
      if (!force && state.screen === 'intro' && lastRenderedScreen === 'intro' && lastRenderedSignature === signature) {
        return;
      }
      lastRenderedScreen = state.screen;
      lastRenderedSignature = signature;
      app.innerHTML = `
        <div class="topbar">
          <div class="brand"><h1>ChimeraCraft</h1><small>Card fusion creature collector</small></div>
          <div class="currencies"><div class="pill">🪙 ${state.coins}</div><div class="pill">💠 ${state.marketCoins}</div></div>
        </div>
        ${showTabs ? `
        <div class="tabs">
          <button type="button" class="tab ${state.screen === 'menu' ? '' : 'secondary'}" onclick="go('menu')">Menu</button>
          <button type="button" class="tab ${state.screen === 'rifts' || state.screen === 'reveal' ? '' : 'secondary'}" onclick="go('rifts')">Catch</button>
          <button type="button" class="tab ${state.screen === 'inventory' ? '' : 'secondary'}" onclick="go('inventory')">Cards</button>
          <button type="button" class="tab ${state.screen === 'team' || state.screen === 'battle' ? '' : 'secondary'}" onclick="go('team')">Battle</button>
        </div>` : ''}
        <div class="screen-wrap ${state.screen === 'intro' ? '' : 'hidden'}">${introScreen()}</div>
        <div class="screen-wrap ${state.screen === 'menu' ? '' : 'hidden'}">${menuScreen()}</div>
        <div class="screen-wrap ${state.screen === 'rifts' ? '' : 'hidden'}">${riftScreen()}</div>
        <div class="screen-wrap ${state.screen === 'reveal' ? '' : 'hidden'}">${revealScreen()}</div>
        <div class="screen-wrap ${state.screen === 'inventory' ? '' : 'hidden'}">${inventoryScreen()}</div>
        <div class="screen-wrap ${state.screen === 'team' ? '' : 'hidden'}">${teamScreen()}</div>
        <div class="screen-wrap ${state.screen === 'battle' ? '' : 'hidden'}">${battleScreen()}</div>
        <div class="screen-wrap ${state.screen === 'shop' ? '' : 'hidden'}">${shopScreen()}</div>
        <div class="screen-wrap ${state.screen === 'market' ? '' : 'hidden'}">${marketScreen()}</div>
        <div class="screen-wrap ${state.screen === 'log' ? '' : 'hidden'}">${logScreen()}</div>
      `;
      if (scrollHost && preserveScroll) {
        isProgrammaticScroll = true;
        scrollHost.scrollTop = appScrollTop;
        lastScrollRestoreAt = Date.now();
        requestAnimationFrame(() => {
          isProgrammaticScroll = false;
        });
      }
      if (activeElement && typeof activeElement.focus === 'function' && document.contains(activeElement)) {
        activeElement.focus({ preventScroll: true });
      }
    }
    function go(screen) {
      if (screen !== 'battle') clearBattleTimer();
      if (screen !== 'reveal') clearRevealSequence();
      // Auto-keep any pending catch when leaving reveal screen
      if (state.screen === 'reveal' && state.latestCatch) {
        autoKeepIfPending();
      }
      state.screen = screen;
      render();
    }
    function setSelectedSlot(index) {
      render();
    }
    function selectRift(index) {
      const keys = Object.keys(rifts);
      const primary = keys[index];
      state.selectedRifts[0] = primary;
      isSelectingSecondRift = true;
      if (secondRiftTimer) clearTimeout(secondRiftTimer);
      render();
      secondRiftTimer = setTimeout(() => {
        const randomRift = choice(keys);
        state.selectedRifts[1] = randomRift;
        isSelectingSecondRift = false;
        secondRiftTimer = null;
        render();
      }, 400);
    }

    function randomizeSecondRift() {
      const keys = Object.keys(rifts);
      state.selectedRifts[1] = choice(keys);
    }
    function catchCreature() {
      if (isSelectingSecondRift) return;
      randomizeSecondRift();
      const creature = generateCreature();
      startRevealSequence(creature);
    }
    function keepLatest() {
      if (!state.latestCatch) return;
      clearRevealSequence();
      addToInventory(state.latestCatch);
      showToast('Card kept.');
      state.latestCatch = null;
      go('rifts');
    }
    function sellLatest() {
      if (!state.latestCatch) return;
      clearRevealSequence();
      state.coins += state.latestCatch.sellValue;
      showToast('Sold for ' + state.latestCatch.sellValue + ' coins.');
      state.latestCatch = null;
      go('rifts');
    }
    function marketLatest() {
      if (!state.latestCatch) return;
      clearRevealSequence();
      state.marketListings.unshift({ ...state.latestCatch, listedAt: Date.now() });
      showToast('Listed on market.');
      state.latestCatch = null;
      go('rifts');
    }
    function autoKeepIfPending() {
      if (state.latestCatch) {
        addToInventory(state.latestCatch);
        state.latestCatch = null;
      }
    }
    function setFocus(id) { state.focusTarget = id; render(); }
    function claimMarket(id) {
      const item = state.marketListings.find(i => i.id === id);
      if (!item) return;
      state.marketCoins += item.marketValue;
      state.marketListings = state.marketListings.filter(i => i.id !== id);
      showToast('Market sale claimed.');
      render();
    }

    async function initSDK() {
      const SDK = window.RemixSDK;
      if (!SDK) return render();
      try {
        await SDK.ready();
        if (SDK.gameInfo) gameInfo = SDK.gameInfo;
        applySafeArea();
        if (SDK.onGameInfo) {
          SDK.onGameInfo((info) => {
            gameInfo = info;
            applySafeArea();
            render();
          });
        }
        SDK.onPlayAgain(() => {
          resetGame();
        });
        SDK.onToggleMute(({ isMuted: muted }) => {
          isMuted = muted;
        });
        // Show Play Again button on game start
        if (window.RemixSDK && window.RemixSDK.singlePlayer && window.RemixSDK.singlePlayer.actions) {
          window.RemixSDK.singlePlayer.actions.gameStart();
        }
        // Also show Play Again button on game over
        if (window.RemixSDK && window.RemixSDK.singlePlayer && window.RemixSDK.singlePlayer.actions) {
          window.RemixSDK.singlePlayer.actions.gameOver({ score: 0 });
        }
      } catch (e) {}
      render();
    }
    function applySafeArea() {
      const inset = gameInfo.viewContext === 'full_screen' ? (gameInfo.contentSafeAreaInset || { top: 0, right: 0, bottom: 0, left: 0 }) : { top: 0, right: 0, bottom: 0, left: 0 };
      document.documentElement.style.setProperty('--safe-top', inset.top + 'px');
      document.documentElement.style.setProperty('--safe-right', inset.right + 'px');
      document.documentElement.style.setProperty('--safe-bottom', inset.bottom + 'px');
      document.documentElement.style.setProperty('--safe-left', inset.left + 'px');
    }

    document.addEventListener('pointerdown', (event) => {
      activePointerId = event.pointerId;
    }, { passive: true });

    document.addEventListener('pointerup', (event) => {
      if (activePointerId === event.pointerId) activePointerId = null;
    }, { passive: true });

    document.addEventListener('pointercancel', (event) => {
      if (activePointerId === event.pointerId) activePointerId = null;
    }, { passive: true });

    document.addEventListener('click', () => {
      activePointerId = null;
    }, { passive: true });

    app.addEventListener('touchstart', (event) => {
      if (event.target.closest('button, .tab, .slot, .battle-unit, .market-item, .rod-item, .rift-btn')) {
        app.classList.add('no-scroll');
      }
    }, { passive: true });

    app.addEventListener('touchend', () => {
      app.classList.remove('no-scroll');
      requestAnimationFrame(() => {
        if (app) app.scrollTop = appScrollTop;
      });
    }, { passive: true });

    app.addEventListener('touchcancel', () => {
      app.classList.remove('no-scroll');
    }, { passive: true });

    app.addEventListener('scroll', () => {
      if (isProgrammaticScroll) return;
      if (Date.now() - lastScrollRestoreAt < 120) return;
      appScrollTop = app.scrollTop;
    }, { passive: true });

    render(true);
    initSDK();
  </script>
</body>
</html>
